services:
  api:
    build: .
    user: "1000:1000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://trails:trails@db:5432/trails
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - PHONE_HASH_SECRET=${PHONE_HASH_SECRET}
      - DEVICE_HASH_SECRET=${DEVICE_HASH_SECRET}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN}
      - JSON_LOGS=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    user: "1000:1000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://trails:trails@db:5432/trails
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A workers worker --loglevel=info

  beat:
    build: .
    user: "1000:1000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://trails:trails@db:5432/trails
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A workers beat --loglevel=info

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: trails
      POSTGRES_PASSWORD: trails
      POSTGRES_DB: trails
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trails"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
